global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'calmara-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'calmara-app'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['calmara-app:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'calmara-app'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'chromadb'
    static_configs:
      - targets: ['chromadb:8000']

  - job_name: 'ollama'
    static_configs:
      - targets: ['ollama:11434']

  - job_name: 'whisper-service'
    static_configs:
      - targets: ['whisper-service:8001']

  - job_name: 'mediapipe-service'
    static_configs:
      - targets: ['mediapipe-service:8002']

  - job_name: 'video-service'
    static_configs:
      - targets: ['video-service:8003']

  - job_name: 'finetune-service'
    static_configs:
      - targets: ['finetune-service:8004']

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
